{% extends "base.html" %}

{% block content %}
<div class="space-y-12 animate-fade-in">

<div class="text-center bg-white p-10 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-r from-indigo-50 to-pink-50 opacity-50 z-0"></div>

<div class="relative z-10">
<h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight leading-tight mb-4 text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-pink-600">
Predict Customer Purchases
</h1>

<p class="mt-4 max-w-2xl mx-auto text-xl text-slate-500">
AI-driven insights to transform your marketing strategy.
</p>
</div>
</div>


<div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">

<div class="lg:col-span-8 glass-card bg-white p-6 sm:p-8 rounded-2xl">

<h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2 border-b border-slate-100 pb-4">
<i class="fa-solid fa-sliders text-indigo-500"></i>
Customer Behavior Data
</h2>


<form id="predictionForm" class="space-y-6">

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

<div>
<label class="block text-sm font-semibold mb-2">Pages Viewed</label>
<input type="number" name="pages_viewed" min="1" max="30" step="1" required class="input-field" placeholder="e.g. 5">
</div>

<div>
<label class="block text-sm font-semibold mb-2">Items Viewed</label>
<input type="number" name="items_viewed" min="1" step="1" required class="input-field" placeholder="e.g. 10">
</div>

<div>
<label class="block text-sm font-semibold mb-2">Time Spent (minutes)</label>
<input type="number" name="time_spent" min="0.5" max="120" step="0.1" required class="input-field" placeholder="e.g. 15.5">
</div>

<div>
<label class="block text-sm font-semibold mb-2">Cart Additions</label>
<input type="number" name="cart_additions" min="0" step="1" required class="input-field" placeholder="e.g. 2">
</div>

<div>
<label class="block text-sm font-semibold mb-2">Previous Purchases</label>
<input type="number" name="previous_purchases" min="0" max="20" step="1" required class="input-field" placeholder="e.g. 1">
</div>

<div>
<label class="block text-sm font-semibold mb-2">Session Duration</label>
<input type="number" name="session_duration" min="1" max="180" step="0.1" required class="input-field" placeholder="e.g. 12">
</div>

<!-- Product Category Dropdown -->
<div>
<label class="block text-sm font-semibold mb-2">Product Category</label>
<select name="product_category" required class="input-field">
<option value="">Select Category</option>
<option value="0">Electronics</option>
<option value="1">Fashion</option>
<option value="2">Home</option>
<option value="3">Sports</option>
<option value="4">Beauty</option>
<option value="5">Books</option>
</select>
</div>

<!-- Device Type Dropdown -->
<div>
<label class="block text-sm font-semibold mb-2">Device Type</label>
<select name="device_type" required class="input-field">
<option value="">Select Device</option>
<option value="0">Desktop</option>
<option value="1">Mobile</option>
<option value="2">Tablet</option>
</select>
</div>

<!-- Traffic Source Dropdown -->
<div>
<label class="block text-sm font-semibold mb-2">Traffic Source</label>
<select name="traffic_source" required class="input-field">
<option value="">Select Source</option>
<option value="0">Organic Search</option>
<option value="1">Paid Ads</option>
<option value="2">Social Media</option>
<option value="3">Direct</option>
</select>
</div>

</div>


<button type="submit" id="submitBtn"
class="w-full md:w-auto px-8 py-4 bg-gradient-to-r from-indigo-600 to-pink-600 text-white font-bold rounded-xl shadow-lg">
Generate Prediction
</button>

<div id="loadingIndicator" class="hidden mt-4 text-center text-indigo-600">
<i class="fa-solid fa-spinner fa-spin text-2xl"></i>
</div>

</form>

</div>


<div class="lg:col-span-4 h-full">

<div id="resultCard"
class="hidden glass-card bg-white p-8 rounded-2xl text-center shadow-xl">

<div class="mb-6">

<div id="resultIcon"
class="w-20 h-20 mx-auto rounded-full flex items-center justify-center text-3xl mb-4 bg-indigo-50 text-indigo-600">
<i class="fa-solid fa-chart-pie"></i>
</div>

<h3 class="text-sm uppercase tracking-wider text-slate-500 font-bold mb-1">
Purchase Probability
</h3>

<div class="text-5xl font-extrabold text-slate-800" id="probValue">
0%
</div>

</div>

<div class="bg-slate-50 rounded-xl p-5 border border-slate-100">
<p id="recommendationText" class="text-xl font-bold text-slate-800">
Pending Analysis
</p>
</div>

</div>

</div>

</div>
</div>
{% endblock %}



{% block scripts %}
<script>

document.getElementById('predictionForm').addEventListener('submit', async function(e){

e.preventDefault()

const formData = new FormData(this)
const data = Object.fromEntries(formData.entries())

const pages = parseInt(data.pages_viewed)
const items = parseInt(data.items_viewed)
const time = parseFloat(data.time_spent)
const cart = parseInt(data.cart_additions)
const prev = parseInt(data.previous_purchases)
const session = parseFloat(data.session_duration)

if(!Number.isInteger(pages) || pages<1 || pages>30){
alert("Pages viewed must be an integer between 1 and 30")
return
}

if(!Number.isInteger(items) || items<1 || items>pages){
alert("Items viewed must be an integer and cannot exceed pages viewed")
return
}

if(time<=0 || time>120){
alert("Time spent must be between 0.5 and 120 minutes")
return
}

if(!Number.isInteger(cart) || cart<0 || cart>items){
alert("Cart additions cannot exceed items viewed")
return
}

if(!Number.isInteger(prev) || prev<0 || prev>20){
alert("Previous purchases must be an integer between 0 and 20")
return
}

if(session < time){
alert("Session duration must be greater than or equal to time spent")
return
}

const submitBtn = document.getElementById('submitBtn')
const loader = document.getElementById('loadingIndicator')
const resultCard = document.getElementById('resultCard')

submitBtn.disabled=true
loader.classList.remove('hidden')

const response = await fetch('/predict',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(data)
})

const result = await response.json()

loader.classList.add('hidden')
submitBtn.disabled=false

if(result.success){

document.getElementById('probValue').innerText = result.probability+"%"
document.getElementById('recommendationText').innerText = result.recommendation

resultCard.classList.remove('hidden')

}

})

</script>
{% endblock %}
