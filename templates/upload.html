{% extends "base.html" %}

{% block content %}
<div class="animate-fade-in max-w-3xl mx-auto space-y-6 mt-10">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-50 text-indigo-600 text-3xl mb-4">
            <i class="fa-solid fa-cloud-arrow-up"></i>
        </div>
        <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Upload Dataset</h1>
        <p class="text-slate-500 mt-2">Import fresh CSV data for batch analysis and training ingestion.</p>
    </div>

    <!-- Upload Card -->
    <div class="glass-card bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        <form id="uploadForm" class="space-y-6">
            <div class="border-2 border-dashed border-indigo-200 rounded-xl p-10 text-center hover:bg-indigo-50 hover:border-indigo-400 transition-colors cursor-pointer group" id="dropzone">
                <i class="fa-solid fa-file-csv text-5xl text-indigo-300 group-hover:text-indigo-500 transition-colors mb-4"></i>
                <h3 class="text-lg font-bold text-slate-700">Drag & Drop CSV File</h3>
                <p class="text-sm text-slate-500 mt-1 mb-4">or click to browse from your computer</p>
                
                <input type="file" name="file" id="fileInput" class="hidden" accept=".csv">
                <button type="button" onclick="document.getElementById('fileInput').click()" class="px-6 py-2 bg-white border border-slate-200 rounded-lg shadow-sm text-sm font-medium text-slate-700 hover:bg-slate-50 hover:text-indigo-600 transition-colors">
                    Browse Files
                </button>
                <div id="fileSelected" class="hidden mt-4 text-sm font-bold text-indigo-600"></div>
            </div>

            <button type="submit" id="uploadBtn" class="w-full btn-gradient text-white py-4 rounded-xl font-bold shadow-lg shadow-indigo-500/30 flex justify-center items-center gap-2" disabled>
                <i class="fa-solid fa-upload"></i> Upload Dataset
            </button>
            <div id="uploadStatus" class="text-center text-sm font-medium hidden"></div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileSelected = document.getElementById('fileSelected');
    const statusMsg = document.getElementById('uploadStatus');

    fileInput.addEventListener('change', function() {
        if(this.files.length > 0) {
            fileSelected.textContent = `Selected: ${this.files[0].name}`;
            fileSelected.classList.remove('hidden');
            uploadBtn.disabled = false;
        } else {
            fileSelected.classList.add('hidden');
            uploadBtn.disabled = true;
        }
    });

    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';
        statusMsg.classList.add('hidden');

        try {
            const response = await fetch('/upload-dataset', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            
            statusMsg.classList.remove('hidden');
            if(result.success) {
                statusMsg.className = "text-center text-sm font-bold text-green-600 mt-4";
                statusMsg.innerHTML = `<i class="fa-solid fa-check-circle mr-1"></i> ${result.message}`;
                fileInput.value = '';
                fileSelected.classList.add('hidden');
            } else {
                statusMsg.className = "text-center text-sm font-bold text-red-500 mt-4";
                statusMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1"></i> Error: ${result.error}`;
                uploadBtn.disabled = false;
            }
        } catch(err) {
            statusMsg.classList.remove('hidden');
            statusMsg.className = "text-center text-sm font-bold text-red-500 mt-4";
            statusMsg.innerHTML = "Upload failed unexpectedly.";
            uploadBtn.disabled = false;
        } finally {
            if(uploadBtn.disabled === true && statusMsg.classList.contains('text-green-600')) {
                uploadBtn.innerHTML = '<i class="fa-solid fa-check"></i> Success';
            } else {
                uploadBtn.innerHTML = '<i class="fa-solid fa-upload"></i> Upload Dataset';
            }
        }
    });
</script>
{% endblock %}
